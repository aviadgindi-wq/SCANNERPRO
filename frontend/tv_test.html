<!DOCTYPE html>
<html>
<head>
<script src='https://s3.tradingview.com/tv.js'></script>
</head>
<body>
<div id='tv_chart'></div>
<script>
window.onload = () => {
  var widget = new TradingView.widget({
    autosize: true, symbol: 'AAPL', interval: 'D', container_id: 'tv_chart'
  });
  widget.onChartReady(() => {
    console.log("chart ready");
    var keys = Object.keys(widget);
    console.log("Widget keys:", keys);
    if(widget.activeChart) console.log("has activeChart");
    if(widget.setSymbol) console.log("has widget.setSymbol");
    
    // Check prototype
    var protoKeys = [];
    for (var k in widget) { protoKeys.push(k); }
    console.log("All properties:", protoKeys.join(', '));
  });
}
</script>
</body>
</html>
